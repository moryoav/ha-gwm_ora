name: Cleanup GHCR

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete GWM ORA package versions
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          for package in ha-gwm-ora-amd64 ha-gwm-ora-aarch64 ha-gwm-ora-armv7; do
            echo "Deleting GHCR versions for ${package}"
            while true; do
              status="$(
                curl -sS \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  -o versions.json \
                  -w "%{http_code}" \
                  "https://api.github.com/users/${OWNER}/packages/container/${package}/versions?per_page=100"
              )"

              if [ "${status}" = "404" ]; then
                echo "${package} is already absent"
                break
              fi

              if [ "${status}" != "200" ]; then
                echo "Failed to list ${package}: HTTP ${status}"
                cat versions.json
                exit 1
              fi

              count="$(jq 'length' versions.json)"
              if [ "${count}" = "0" ]; then
                echo "No versions left for ${package}"
                break
              fi

              jq -r '.[].id' versions.json | while read -r version_id; do
                echo "Deleting ${package} version ${version_id}"
                curl -fsS \
                  -X DELETE \
                  -H "Authorization: Bearer ${GH_TOKEN}" \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  "https://api.github.com/users/${OWNER}/packages/container/${package}/versions/${version_id}"
              done
            done
          done
