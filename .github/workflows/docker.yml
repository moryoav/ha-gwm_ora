name: Add-on Images

on:
  push:
    branches: [main]
    tags: ["*"]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - ha_arch: amd64
            platform: linux/amd64
          - ha_arch: aarch64
            platform: linux/arm64
          - ha_arch: armv7
            platform: linux/arm/v7
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: addons/gwm_ora/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-gwm-ora-${{ matrix.ha_arch }}:latest
            ghcr.io/${{ github.repository_owner }}/ha-gwm-ora-${{ matrix.ha_arch }}:${{ github.sha }}
