name: GWM ORA
version: "0.2.6"
slug: gwm_ora
description: Native Home Assistant add-on for GWM ORA vehicles
url: https://github.com/moryoav/ha-gwm_ora
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
hassio_api: true
discovery:
  - gwm_ora
ports:
  8099/tcp: null
ports_description:
  8099/tcp: Internal API for the GWM ORA custom integration
options:
  country: DE
  username: ""
  password: ""
  enable_remote_commands: false
  poll_interval_seconds: 60
  log_level: info
schema:
  country: "match(^[A-Za-z]{2}$)"
  username: email
  password: password
  verification_code: password?
  security_pin: password?
  enable_remote_commands: bool
  poll_interval_seconds: "int(30,3600)"
  log_level: "list(trace|debug|info|warning|error)"
environment:
  ASPNETCORE_HTTP_PORTS: "8099"
